name: Publish to PyPI

# Trigger on either a pushed version tag (vX.Y.Z, vX.Y.ZaN, etc.) or
# a published GitHub Release.  Either path produces the same build +
# upload sequence.
#
# Authentication uses PyPI Trusted Publishing (OIDC) -- no API tokens
# are stored in repo secrets.  To enable this on first publish:
#
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a "pending publisher" with:
#        Owner:           ligon
#        Repository:      DGP_Protocol
#        Workflow file:   publish.yml
#        Environment:     pypi
#   3. After the first successful run, the pending publisher is
#      promoted to a real trusted publisher and survives subsequent
#      releases.
#
# README handling: README.org is the canonical source.  The build
# job runs pandoc to emit README.md (which pyproject.toml points at
# for the PyPI long_description) -- this keeps Markdown drift out
# of the repo.  See CONTRIBUTING.md for the local-build recipe.

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  # Manual dispatch is useful for shaking out the build pipeline
  # without cutting a tag.  When run this way, the publish job is
  # skipped (guarded below).
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Generate README.md from README.org
        run: pandoc -f org -t gfm README.org -o README.md

      - name: Verify pyproject metadata
        run: poetry check

      - name: Build sdist + wheel
        run: poetry build

      - name: Show built artifacts
        run: ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Fire on either a tag push or a published Release.  Skip manual
    # workflow_dispatch runs so they can be used purely to exercise
    # the build pipeline.
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/DGP-Protocol/
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
